# Fly app config — see https://fly.io/docs/reference/configuration/
# scripts/*.sh read the app name and region from this file.

app = 'accounts-providers-fly'
primary_region = 'lax'

[build]

[mounts]
  source = 'data'
  destination = '/mnt'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
