name: Test

on: [push, pull_request]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: extractions/setup-just@v3
      - name: Install frontend deps
        run: npm install --prefix frontend
      - name: Build frontend bundle
        run: just frontend
      - name: Format check
        run: uv run ruff format --check datasette_accounts tests
      - name: Lint
        run: uv run ruff check datasette_accounts tests
      - name: Generated queries in sync
        run: just check-queries-fresh
      - name: Backend tests
        run: just test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: extractions/setup-just@v3
      - name: Install frontend deps
        run: npm install --prefix frontend
      - name: Generate page-data types
        run: just types
      - name: Type-check
        run: npm run check --prefix frontend
      - name: Format check
        run: npm run format:check --prefix frontend
